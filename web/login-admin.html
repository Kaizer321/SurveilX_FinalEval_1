<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Admin | SurveilX</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base: #060913;
      --bg-card: rgba(17, 24, 39, 0.6);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #10b981; /* Emerald for Admin */
      --accent-glow: rgba(16, 185, 129, 0.5);
    }
    body {
      margin: 0; font-family: 'Outfit', sans-serif;
      background: var(--bg-base); color: var(--text);
      min-height: 100vh; display: grid; place-items: center;
      position: relative; overflow: hidden;
    }
    body::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(circle at 80% 30%, rgba(16, 185, 129, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 20% 70%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
      z-index: -1; pointer-events: none;
      animation: bgPulse 10s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.2); }
    }
    .box {
      width: 100%; max-width: 400px; padding: 40px;
      background: var(--bg-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(16, 185, 129, 0.1);
      position: relative; overflow: hidden;
    }
    .box::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    }
    h1 { margin: 0 0 8px; font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #fff, #6ee7b7); -webkit-background-clip: text; color: transparent; text-align: center; }
    .muted { color: var(--muted); margin-bottom: 24px; text-align: center; font-size: 15px; }
    .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    label { font-size: 13px; font-weight: 500; color: var(--muted); }
    .input {
      background: rgba(0,0,0,0.2); color: var(--text);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; font-size: 15px; font-family: inherit; transition: 0.3s;
    }
    .input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2); background: rgba(0,0,0,0.4); }
    .btn {
      width: 100%; background: linear-gradient(135deg, var(--accent), #059669);
      color: white; border: none; border-radius: 12px;
      padding: 14px; font-size: 16px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px var(--accent-glow);
    }
    .btn:hover { box-shadow: 0 6px 20px var(--accent-glow); transform: translateY(-2px); filter: brightness(1.1); }
    .btn:active { transform: translateY(0); }
    .row { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; font-size: 14px; }
    a { color: #6ee7b7; text-decoration: none; font-weight: 500; transition: 0.3s; }
    a:hover { color: #fff; text-shadow: 0 0 8px var(--accent-glow); }
  </style>
</head>
<body>
  <div class="box">
    <h1>SurveilX Admin</h1>
    <div class="muted">System Control Panel</div>
    <form id="login-form">
      <div class="field">
        <label>Admin Username</label>
        <input class="input" type="text" id="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label>Admin Password</label>
        <div style="position:relative">
          <input class="input" type="password" id="password" autocomplete="current-password" required style="width:100%; padding-right:40px; box-sizing:border-box;" />
          <button type="button" id="toggle-pw" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:16px; color:var(--muted); transition:0.3s;" title="Show/Hide Password">👁️</button>
        </div>
      </div>
      <button class="btn" type="submit">Authenticate</button>
    </form>
    <div class="row">
      <span class="muted" style="margin:0;">Not an admin?</span>
      <a href="login-user.html">User Login</a>
    </div>
  </div>
  <script>
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const inp = document.getElementById('password');
      const btn = document.getElementById('toggle-pw');
      if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🔒'; }
      else { inp.type = 'password'; btn.textContent = '👁️'; }
    });
    const form = document.getElementById('login-form');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = form.querySelector('.btn');
      btn.textContent = 'Authenticating...'; btn.disabled = true;
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, role: 'admin' })
        });
        if (!res.ok) throw new Error('Invalid admin credentials');
        const data = await res.json();
        localStorage.setItem('authToken', data.token);
        localStorage.setItem('authRole', data.role);
        location.href = 'index.html';
      } catch (err) {
        alert(err.message || 'Login failed');
        btn.textContent = 'Authenticate'; btn.disabled = false;
      }
    });
  </script>
</body>
</html>
